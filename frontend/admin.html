<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GuardianAI | Admin Fleet Control</title>
    <link rel="stylesheet" href="style.css">
    <!-- PDF Export Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root {
            --admin-primary: #00d2ff;
            --admin-secondary: #3a7bd5;
        }

        body {
            background: radial-gradient(circle at top right, #1a1a2e, #0f0f1a);
            color: #fff;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 20px;
        }

        .admin-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 30px;
        }

        .admin-title {
            font-size: 24px;
            background: linear-gradient(to right, var(--admin-primary), var(--admin-secondary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .driver-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 20px;
            transition: transform 0.3s ease;
        }

        .driver-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.06);
            border-color: var(--admin-primary);
        }

        .driver-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
        }

        .driver-name {
            font-size: 18px;
            font-weight: 600;
            color: var(--admin-primary);
        }

        .driver-meta {
            font-size: 13px;
            color: #888;
            margin-bottom: 5px;
        }

        .metric-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
            margin-right: 5px;
        }

        .badge-drowsy { background: #ff3366; color: white; }
        .badge-yawn { background: #ff8000; color: white; }
        .badge-trips { background: #00d2ff; color: white; }

        .mini-dl-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #00d2ff;
            font-size: 10px;
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 700;
        }

        .mini-dl-btn:hover {
            background: #00d2ff;
            color: white;
        }

        .delete-btn {
            background: rgba(255, 51, 102, 0.1);
            border: 1px solid rgba(255, 51, 102, 0.2);
            color: #ff3366;
            font-size: 10px;
            padding: 4px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 700;
            margin-left: 5px;
        }

        .delete-btn:hover {
            background: #ff3366;
            color: white;
        }

        .refresh-btn {
            background: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }

        .refresh-btn:hover {
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.4);
        }

        .empty-state {
            text-align: center;
            padding: 50px;
            color: #555;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <header class="admin-header">
            <div class="admin-title">GUARDIAN AI | FLEET ADMIN PANEL</div>
            <div>
                <button class="refresh-btn" style="background: #222;" onclick="downloadPDF()">⬇️ EXPORT PDF</button>
                <button class="refresh-btn" onclick="loadAdminData()">🔄 REFRESH DATA</button>
            </div>
        </header>

        <div id="driver-grid" class="stats-grid">
            <!-- Cards will be injected here -->
            <div class="empty-state">Loading fleet data...</div>
        </div>
    </div>

    <script>
        async function downloadPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            
            doc.setFontSize(20);
            doc.text("GUARDIAN AI | FLEET SAFETY REPORT", 14, 22);
            doc.setFontSize(11);
            doc.text(`Generated on: ${new Date().toLocaleString()}`, 14, 30);

            const response = await fetch('/api/admin/data');
            const data = await response.json();
            
            const rows = Object.keys(data).map(user => [
                user,
                data[user].details.vehicle,
                data[user].trips,
                data[user].drowsy_count,
                data[user].yawn_count,
                data[user].last_login
            ]);

            doc.autoTable({
                head: [['Driver', 'Vehicle', 'Trips', 'Drowsy', 'Yawns', 'Last Login']],
                body: rows,
                startY: 40,
                theme: 'grid',
                headStyles: { fillStyle: [58, 123, 213] }
            });

            doc.save(`fleet_safety_report_${new Date().getTime()}.pdf`);
        }

        async function downloadDriverPDF(user) {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            
            const response = await fetch('/api/admin/data');
            const data = await response.json();
            const info = data[user];
            const details = info.details;

            doc.setFontSize(22);
            doc.setTextColor(58, 123, 213);
            doc.text("GUARDIAN AI | DRIVER SAFETY DOSSIER", 14, 22);
            
            doc.setFontSize(14);
            doc.setTextColor(0, 0, 0);
            doc.text(`Driver: ${user}`, 14, 35);
            doc.setFontSize(11);
            doc.text(`Generated: ${new Date().toLocaleString()}`, 14, 42);

            const rows = [
                ['Full Name', user],
                ['Vehicle', details.vehicle],
                ['Phone', details.phone],
                ['License No.', details.license],
                ['Total Trips', info.trips.toString()],
                ['Drowsy Incidents', info.drowsy_count.toString()],
                ['Yawn Incidents', info.yawn_count.toString()],
                ['Last Active', info.last_login]
            ];

            doc.autoTable({
                body: rows,
                startY: 50,
                theme: 'striped',
                headStyles: { fillColor: [58, 123, 213] },
                columnStyles: { 0: { fontStyle: 'bold', width: 50 } }
            });

            // Summary Text
            const finalY = doc.lastAutoTable.finalY + 15;
            doc.setFontSize(12);
            doc.text("SAFETY EVALUATION:", 14, finalY);
            doc.setFontSize(10);
            const score = Math.max(0, 100 - (info.drowsy_count * 10));
            doc.text(`The driver has a fatigue score of ${score}/100. Recommendations: Keep monitored.`, 14, finalY + 7);

            doc.save(`Safety_Report_${user}_${new Date().getTime()}.pdf`);
        }

        async function deleteDriver(username) {
            if (!confirm(`Are you sure you want to PERMANENTLY delete ${username}?`)) return;
            
            try {
                const response = await fetch('/api/admin/delete_driver', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: username })
                });
                const result = await response.json();
                if (result.status === "success") {
                    alert("✅ Driver record deleted.");
                    loadAdminData(); // Refresh list
                } else {
                    alert("❌ Error: " + result.message);
                }
            } catch (err) {
                alert("❌ Failed to contact server.");
            }
        }

                async function testTelegram(username, tgId) {
            try {
                const response = await fetch('/api/admin/test_driver_tg', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: username, telegram_id: tgId })
                });
                const result = await response.json();
                alert(result.status === "success" ? "✅ " + result.message : "❌ " + result.message);
            } catch (err) {
                alert("❌ Failed to reach server.");
            }
        }

        async function loadAdminData() {
            try {
                const response = await fetch('/api/admin/data');
                const data = await response.json();
                renderCards(data);
            } catch (err) {
                console.error("Failed to fetch admin data", err);
            }
        }

        function renderCards(data) {
            const grid = document.getElementById('driver-grid');
            grid.innerHTML = '';
            
            const usernames = Object.keys(data);
            
            if (usernames.length === 0) {
                grid.innerHTML = '<div class="empty-state">No driver data recorded yet.</div>';
                return;
            }

            usernames.forEach(user => {
                const info = data[user];
                const card = document.createElement('div');
                card.className = 'driver-card';
                
                const details = info.details || {};
                
                card.innerHTML = `
                    <div class="driver-header">
                        <span class="driver-name">${user}</span>
                        <div>
                            <button onclick="testTelegram('${user}', '${details.tg_id}')" class="mini-dl-btn" style="border-color: #25d366; color: #25d366;">🔔 TEST TG</button>
                            <button onclick="downloadDriverPDF('${user}')" class="mini-dl-btn">📄 REPORT</button>
                            <button onclick="deleteDriver('${user}')" class="delete-btn">🗑️ DELETE</button>
                        </div>
                    </div>
                    <div class="driver-meta"><b>Last seen:</b> ${info.last_login || 'N/A'}</div>
                    <div class="driver-meta"><b>Vehicle:</b> ${details.vehicle || 'N/A'}</div>
                    <div class="driver-meta"><b>Phone:</b> ${details.phone || 'N/A'}</div>
                    <div class="driver-meta"><b>License:</b> ${details.license || 'N/A'}</div>
                    <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.05); margin: 15px 0;">
                    <div style="display: flex; gap: 5px; flex-wrap: wrap;">
                        <span class="metric-badge badge-drowsy">${info.drowsy_count || 0} Drowsy</span>
                        <span class="metric-badge badge-yawn">${info.yawn_count || 0} Yawns</span>
                        <span class="metric-badge badge-trips">${info.trips || 0} Trips</span>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // Initial load
        loadAdminData();
        // Auto refresh every 30 seconds
        setInterval(loadAdminData, 30000);
    </script>
</body>
</html>
